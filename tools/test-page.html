<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Step 0 — Visual Feedback Loop Test</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: linear-gradient(135deg, #0b0f1a 0%, #1a1f3a 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 16px;
    padding: 44px;
    max-width: 560px;
    text-align: center;
    backdrop-filter: blur(6px);
  }
  .badge {
    display: inline-block;
    background: #3b82f6;
    color: #fff;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  h1 { font-size: 34px; margin: 18px 0 8px; }
  p { color: #a9b2c8; line-height: 1.6; font-size: 16px; }
  .cta {
    margin-top: 24px;
    display: inline-block;
    background: #22c55e;
    color: #04210f;
    font-weight: 700;
    padding: 14px 28px;
    border-radius: 10px;
    text-decoration: none;
  }
  .marker { margin-top: 30px; font-family: monospace; color: #fbbf24; font-size: 14px; }
</style>
</head>
<body>
  <div class="card">
    <span class="badge">STEP 0 • FEEDBACK LOOP TEST</span>
    <h1>Visual feedback loop is live ✅</h1>
    <p>If Claude can read the text on this card and describe the colors, the screenshot pipeline works.</p>
    <a class="cta" href="#">Claim my 4% discount →</a>
    <div class="marker">CANARY-CAN-YOU-READ-THIS-12345</div>
  </div>
</body>
</html>
